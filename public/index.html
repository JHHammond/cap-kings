<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ============================================================
         BASIC
         ============================================================ -->
    <title>Cap Kings — Build a $15 NFL Squad</title>
    <meta name="description" content="Draft 5 NFL players under $15. Stack chemistry. Can you go 20-0?" />
    <meta name="theme-color" content="#111318" />

    <!-- ============================================================
         ICONS
         favicon.ico      → tab / browser chrome
         apple-touch-icon → iMessage URL icon + "Add to Home Screen"
         ============================================================ -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Cap Kings" />

    <!-- ============================================================
         OPEN GRAPH  (iMessage, Slack, WhatsApp, Facebook)
         ============================================================ -->
    <meta property="og:site_name" content="Cap Kings" />
    <meta property="og:title" content="Can you go 20-0?" />
    <meta property="og:description" content="Draft 5 NFL players under $15. Stack chemistry. Survive 20 games." />
    <meta property="og:url" content="https://cap-kings.com" />
    <meta property="og:type" content="website" />

    <!-- Static fallback image (required even if you add the video) -->
    <meta property="og:image" content="https://cap-kings.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Animated video preview in iMessage (Step 4 from the guide)  -->
    <!-- Record share-loop.mp4 from share-loop.html, keep it < 2MB  -->
    <meta property="og:video" content="https://cap-kings.com/share-loop.mp4" />
    <meta property="og:video:type" content="video/mp4" />
    <meta property="og:video:width" content="1200" />
    <meta property="og:video:height" content="630" />

    <!-- ============================================================
         TWITTER / X
         ============================================================ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Can you go 20-0?" />
    <meta name="twitter:description" content="Draft 5 NFL players under $15. Stack chemistry. Survive 20 games." />
    <meta name="twitter:image" content="https://cap-kings.com/og-image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
